<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handover Hub | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .card-fatura { 
            background: #0f172a;
            border: 1px solid #1e293b;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .card-fatura:hover {
            border-color: #3b82f6;
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(59, 130, 246, 0.2);
        }

        .glass-effect {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <header class="sticky top-0 z-50 glass-effect border-b border-slate-800 py-6 px-6 mb-8">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-left">
                <h1 class="text-2xl font-black text-white tracking-tighter italic uppercase">
                    Handover <span class="text-blue-500">Ops</span>
                </h1>
                <p class="text-slate-500 text-[10px] font-bold tracking-[0.2em] uppercase">Sincronizado via Google API</p>
            </div>
            
            <div class="relative w-full md:w-64">
                <input type="text" id="searchInput" placeholder="Buscar ferramenta..." 
                       class="w-full bg-slate-900/80 border border-slate-700 rounded-full py-2 px-10 text-xs focus:ring-2 focus:ring-blue-500 outline-none transition-all text-white">
                <i class="fas fa-search absolute left-4 top-2.5 text-slate-600 text-xs"></i>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div id="loader" class="text-center py-20">
            <div class="animate-spin inline-block w-10 h-10 border-[3px] border-blue-500 border-t-transparent rounded-full mb-4"></div>
            <p class="text-slate-500 font-medium animate-pulse">Consultando dados da planilha...</p>
        </div>

        <div id="faturasGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwnqlMd_MUcLktFU_iHgvZ-jGATqUkzdnzS7wNOnRsPeCktwurygFnmv-7PRyMmgHrgfA/exec';

        async function fetchFaturas() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const grid = document.getElementById('faturasGrid');
                document.getElementById('loader').classList.add('hidden');
                grid.innerHTML = '';

                data.forEach(item => {
                    // Função auxiliar para pegar dados sem erro de nome de coluna
                    const val = (aliases) => {
                        const keys = Object.keys(item);
                        for (let a of aliases) {
                            const found = keys.find(k => k.toLowerCase().replace(/_/g, '').includes(a.toLowerCase()));
                            if (found) return item[found];
                        }
                        return null;
                    };

                    const ferramenta = val(['ferramenta', 'nome']) || 'N/A';
                    const dia         = val(['vencimento', 'dia', 'data']) || '--';
                    const responsavel = val(['responsavel', 'pessoa', 'quem']) || 'N/A';
                    const metodo      = val(['metodo', 'pagamento', 'forma']) || 'A definir';
                    const link        = val(['link', 'url', 'site', 'acesso']) || '#';

                    const card = `
                        <div class="card-fatura p-6 rounded-2xl flex flex-col justify-between" data-search="${ferramenta.toLowerCase()}">
                            <div>
                                <div class="flex justify-between items-start mb-6">
                                    <div class="bg-gradient-to-br from-blue-500 to-blue-700 text-white min-w-[58px] h-[58px] rounded-2xl flex flex-col items-center justify-center shadow-xl shadow-blue-900/30 border border-blue-400/30">
                                        <span class="text-[10px] uppercase font-black leading-none opacity-70">Dia</span>
                                        <span class="text-2xl font-black leading-none">${dia}</span>
                                    </div>
                                    <div class="text-right">
                                        <span class="block text-[9px] text-slate-500 uppercase font-black tracking-widest mb-1">Responsavel</span>
                                        <span class="inline-block bg-slate-800 text-blue-400 text-[11px] font-bold px-3 py-1 rounded-full border border-slate-700 italic">
                                            @${responsavel}
                                        </span>
                                    </div>
                                </div>
                                
                                <h2 class="text-xl font-bold text-white mb-2 tracking-tight">${ferramenta}</h2>
                                
                                <div class="flex items-center gap-3 mb-8 bg-slate-900/80 p-3 rounded-xl border border-slate-800/50">
                                    <div class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center">
                                        <i class="fas fa-credit-card text-blue-500 text-xs"></i>
                                    </div>
                                    <div>
                                        <p class="text-[9px] text-slate-500 uppercase font-bold leading-none mb-1">Metodo de Pagto</p>
                                        <p class="text-xs text-slate-200 font-semibold uppercase tracking-tight">${metodo}</p>
                                    </div>
                                </div>
                            </div>

                            <a href="${link}" target="_blank" class="flex items-center justify-center w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl text-xs font-black transition-all shadow-lg shadow-blue-600/20 uppercase tracking-widest active:scale-95">
                                <i class="fas fa-external-link-alt mr-2"></i> Abrir Portal
                            </a>
                        </div>
                    `;
                    grid.innerHTML += card;
                });

                // Lógica de busca
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.card-fatura').forEach(card => {
                        const name = card.getAttribute('data-search');
                        card.style.display = name.includes(term) ? 'flex' : 'none';
                    });
                });

            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('loader').innerHTML = `
                    <div class="bg-red-500/10 border border-red-500/20 p-6 rounded-2xl inline-block text-red-500">
                        <i class="fas fa-times-circle text-2xl mb-2"></i>
                        <p class="font-bold">Erro na conexão com a planilha</p>
                        <p class="text-xs opacity-70">Verifique a URL do AppScript e se a planilha está pública.</p>
                    </div>`;
            }
        }

        fetchFaturas();
    </script>
</body>
</html>
