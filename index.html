<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handover | Dashboard de Operações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card-fatura { 
            background: #0f172a;
            border: 1px solid #1e293b;
            transition: all 0.3s ease;
        }
        .card-fatura:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <header class="py-12 px-6 text-center border-b border-slate-900">
        <div class="inline-block bg-blue-600/10 text-blue-500 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest mb-4">
            Acesso Restrito Interno
        </div>
        <h1 class="text-4xl font-black text-white tracking-tight">Handover Hub</h1>
        <p class="text-slate-500 mt-2 max-w-xl mx-auto text-sm">
            Indicadores de faturas, processos e ferramentas sincronizados via Google API.
        </p>
    </header>

    <section class="max-w-6xl mx-auto px-6 mt-8">
        <div class="relative max-w-md">
            <input type="text" id="searchInput" placeholder="Filtrar por ferramenta ou responsável..." 
                   class="w-full bg-slate-900 border border-slate-800 rounded-lg py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-all">
            <i class="fas fa-search absolute left-3 top-3 text-slate-600"></i>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div id="loader" class="text-center py-20">
            <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-blue-600 rounded-full" role="status"></div>
            <p class="text-slate-500 mt-4 font-medium italic">Consultando Google Sheets...</p>
        </div>

        <div id="faturasGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <footer class="text-center py-10 text-slate-600 text-xs border-t border-slate-900">
        &copy; 2024 - Sistema de Passagem de Bastão Automático
    </footer>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwnqlMd_MUcLktFU_iHgvZ-jGATqUkzdnzS7wNOnRsPeCktwurygFnmv-7PRyMmgHrgfA/exec';

        async function fetchFaturas() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const grid = document.getElementById('faturasGrid');
                const loader = document.getElementById('loader');
                
                loader.classList.add('hidden');
                grid.innerHTML = ''; // Limpa o grid

                data.forEach(item => {
                    // Normalização básica para evitar erros se a célula estiver vazia
                    const ferramenta = item.ferramenta || 'Sem nome';
                    const dia = item.dia_de_vencimento || '--';
                    const resp = item.responsavel || 'N/A';
                    const metodo = item.metodo_de_pagamento || 'A definir';
                    const link = item.link_de_acesso || '#';

                    const card = `
                        <div class="card-fatura p-6 rounded-xl group" data-search="${ferramenta.toLowerCase()} ${resp.toLowerCase()}">
                            <div class="flex justify-between items-start mb-6">
                                <div class="bg-blue-600 text-white w-12 h-12 rounded-lg flex items-center justify-center font-bold text-xl shadow-lg shadow-blue-900/20">
                                    ${dia}
                                </div>
                                <div class="text-right">
                                    <span class="block text-[10px] text-slate-500 uppercase font-black tracking-widest">Responsável</span>
                                    <span class="text-sm font-semibold text-slate-300 italic">${resp}</span>
                                </div>
                            </div>
                            
                            <h2 class="text-xl font-bold text-white mb-1 group-hover:text-blue-400 transition-colors">${ferramenta}</h2>
                            <p class="text-xs text-slate-500 mb-6 flex items-center">
                                <i class="fas fa-credit-card mr-2 text-blue-500/50"></i> ${metodo}
                            </p>

                            <a href="${link}" target="_blank" class="flex items-center justify-center w-full bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-lg text-xs font-bold transition-all shadow-lg shadow-blue-900/10">
                                <i class="fas fa-external-link-alt mr-2"></i> ACESSAR PORTAL
                            </a>
                        </div>
                    `;
                    grid.innerHTML += card;
                });

                // Lógica de busca em tempo real
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const cards = document.querySelectorAll('.card-fatura');
                    cards.forEach(c => {
                        const content = c.getAttribute('data-search');
                        c.style.display = content.includes(term) ? 'block' : 'none';
                    });
                });

            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('loader').innerHTML = `
                    <div class="text-red-500 bg-red-500/10 p-4 rounded-lg inline-block border border-red-500/20">
                        <i class="fas fa-exclamation-triangle mb-2"></i>
                        <p class="text-sm font-bold">Erro ao conectar com a API do Google.</p>
                        <p class="text-xs opacity-70">Certifique-se que o script está implantado como "Qualquer pessoa".</p>
                    </div>`;
            }
        }

        fetchFaturas();
    </script>
</body>
</html>
