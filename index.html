<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handover Ops | Passagem de Bastão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .card-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }
        .card-glass:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen pb-20">

    <header class="py-10 px-6 text-center border-b border-slate-800">
        <h1 class="text-4xl font-bold text-white mb-2">🚀 Operação: Passagem de Bastão</h1>
        <p class="text-slate-400">Guia mestre de funções, ferramentas e processos.</p>
        
        <div class="mt-6 max-w-md mx-auto relative">
            <input type="text" id="searchInput" placeholder="Buscar ferramenta, função ou senha..." 
                   class="w-full bg-slate-900 border border-slate-700 rounded-lg py-3 px-12 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="contentGrid">
        
        <div class="card-glass p-6 rounded-xl" data-category="acesso senha">
            <div class="flex items-center mb-4">
                <i class="fas fa-key text-yellow-500 text-2xl mr-3"></i>
                <h2 class="text-xl font-semibold text-white">Cofre de Acessos</h2>
            </div>
            <ul class="space-y-3 text-sm">
                <li class="flex justify-between border-b border-slate-800 pb-2">
                    <span>Gerenciador de Senhas:</span>
                    <a href="#" class="text-blue-400 hover:underline">Acessar Bitwarden</a>
                </li>
                <li class="flex justify-between">
                    <span>VPN Empresa:</span>
                    <span class="text-slate-400 font-mono text-xs">Instalar FortiClient</span>
                </li>
            </ul>
        </div>

        <div class="card-glass p-6 rounded-xl" data-category="financeiro fatura dinheiro">
            <div class="flex items-center mb-4">
                <i class="fas fa-credit-card text-green-500 text-2xl mr-3"></i>
                <h2 class="text-xl font-semibold text-white">Controle de Faturas</h2>
            </div>
            <div class="text-sm space-y-2">
                <p class="bg-slate-900 p-2 rounded text-xs">⚠️ <strong>Próximo Vencimento:</strong> AWS dia 05/10</p>
                <button onclick="alert('Link do Drive das NFs')" class="w-full mt-2 bg-green-600 hover:bg-green-700 text-white py-1 rounded transition">Ver Pasta de Notas</button>
            </div>
        </div>

        <div class="card-glass p-6 rounded-xl" data-category="ferramenta software app">
            <div class="flex items-center mb-4">
                <i class="fas fa-tools text-blue-500 text-2xl mr-3"></i>
                <h2 class="text-xl font-semibold text-white">Stack de Ferramentas</h2>
            </div>
            <div class="flex flex-wrap gap-2">
                <span class="bg-slate-800 px-2 py-1 rounded text-xs">Jira</span>
                <span class="bg-slate-800 px-2 py-1 rounded text-xs">Slack</span>
                <span class="bg-slate-800 px-2 py-1 rounded text-xs">Zendesk</span>
                <span class="bg-slate-800 px-2 py-1 rounded text-xs">Postman</span>
            </div>
        </div>

    </main>

    <script>
        // Lógica simples de busca
        const searchInput = document.getElementById('searchInput');
        const cards = document.querySelectorAll('.card-glass');

        searchInput.addEventListener('keyup', () => {
            const term = searchInput.value.toLowerCase();
            cards.forEach(card => {
                const category = card.getAttribute('data-category').toLowerCase();
                const text = card.innerText.toLowerCase();
                
                if (category.includes(term) || text.includes(term)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
