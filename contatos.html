<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handover Ops | Contatos Críticos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        
        .contact-card { 
            background: #0f172a; 
            border: 1px solid #1e293b; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        .contact-card:hover { 
            border-color: #3b82f6; 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.1); 
        }

        .logo-frame { 
            background: white; 
            padding: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .btn-contact {
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn-contact:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.4);
            color: #60a5fa;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <header class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-slate-800 py-6 px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4 text-left w-full md:w-auto">
                <a href="index.html" class="w-10 h-10 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center hover:bg-slate-800 transition-colors">
                    <i class="fas fa-arrow-left text-slate-400"></i>
                </a>
                <div>
                    <h1 class="text-xl font-black text-white tracking-tighter uppercase italic">
                        Network <span class="text-blue-500">Hub</span>
                    </h1>
                    <p class="text-green-500 text-[9px] font-bold tracking-widest uppercase italic leading-none mt-1">● Stakeholder Directory</p>
                </div>
            </div>
            
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" placeholder="Buscar por empresa, nome ou setor..." 
                       class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-12 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-white">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-600"></i>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div id="loader" class="text-center py-32">
            <div class="animate-spin inline-block w-10 h-10 border-[3px] border-blue-500 border-t-transparent rounded-full"></div>
            <p class="text-slate-500 mt-4 font-medium italic uppercase tracking-widest text-[10px]">Mapeando Conexões...</p>
        </div>

        <div id="contactsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        // CONFIGURAÇÕES
        const API_URL = 'https://script.google.com/macros/s/AKfycbxhPpNT5pxpe__PeJXW7MtsFOzX1Cag-ZZYG0_MIkXpWA-U699yvzn4YTT4sHaPBybS4Q/exec'; 
        const LOGO_TOKEN = 'pk_FGnHpYa7RVyBaPNWay1WYg';

        async function fetchContacts() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const grid = document.getElementById('contactsGrid');
                document.getElementById('loader').classList.add('hidden');
                grid.innerHTML = '';

                data.forEach(item => {
                    const getVal = (aliases) => {
                        const keys = Object.keys(item);
                        for (let a of aliases) {
                            const found = keys.find(k => k.toLowerCase().replace(/_/g, '').includes(a.toLowerCase()));
                            if (found) return item[found];
                        }
                        return '';
                    };

                    const empresa   = getVal(['empresa']);
                    const nome      = getVal(['nome', 'pessoa']);
                    const funcao    = getVal(['funcao', 'cargo']);
                    const setor     = getVal(['setor', 'departamento']);
                    const email     = getVal(['email']);
                    const whatsapp  = getVal(['whatsapp', 'whats']).toString().replace(/\D/g, '');
                    const telefone  = getVal(['telefone', 'tel']);
                    const logo      = getVal(['logo', 'dominio']) || 'missing.com';

                    const logoUrl = `https://img.logo.dev/${logo.trim()}?token=${LOGO_TOKEN}`;
                    const fallbackUrl = `https://ui-avatars.com/api/?name=${empresa}&background=1e293b&color=3b82f6&bold=true`;

                    grid.innerHTML += `
                        <div class="contact-card p-6 rounded-[2rem] flex flex-col justify-between relative overflow-hidden" data-search="${empresa.toLowerCase()} ${nome.toLowerCase()} ${setor.toLowerCase()}">
                            <div class="flex items-center gap-4 mb-6">
                                <div class="w-16 h-16 logo-frame rounded-2xl border border-slate-700 overflow-hidden">
                                    <img src="${logoUrl}" alt="${empresa}" class="max-w-full max-h-full object-contain" onerror="this.src='${fallbackUrl}'">
                                </div>
                                <div>
                                    <h2 class="text-lg font-black text-white leading-tight uppercase tracking-tighter italic">${empresa}</h2>
                                    <span class="text-[10px] text-blue-500 font-bold uppercase tracking-widest italic">${setor}</span>
                                </div>
                            </div>

                            <div class="mb-8">
                                <p class="text-xl font-bold text-slate-100">${nome}</p>
                                <p class="text-xs text-slate-500 font-medium uppercase tracking-tight italic">${funcao}</p>
                            </div>

                            <div class="grid grid-cols-1 gap-2">
                                ${email ? `
                                <a href="mailto:${email}" class="btn-contact flex items-center justify-between p-3 rounded-xl text-xs font-bold transition-all">
                                    <span class="flex items-center gap-3"><i class="fas fa-envelope text-blue-500"></i> E-mail</span>
                                    <i class="fas fa-chevron-right opacity-30 text-[8px]"></i>
                                </a>` : ''}

                                ${whatsapp ? `
                                <a href="https://wa.me/${whatsapp}" target="_blank" class="btn-contact flex items-center justify-between p-3 rounded-xl text-xs font-bold transition-all">
                                    <span class="flex items-center gap-3"><i class="fab fa-whatsapp text-green-500 text-sm"></i> WhatsApp</span>
                                    <i class="fas fa-chevron-right opacity-30 text-[8px]"></i>
                                </a>` : ''}

                                ${telefone ? `
                                <a href="tel:${telefone}" class="btn-contact flex items-center justify-between p-3 rounded-xl text-xs font-bold transition-all">
                                    <span class="flex items-center gap-3"><i class="fas fa-phone text-slate-400"></i> ${telefone}</span>
                                    <i class="fas fa-chevron-right opacity-30 text-[8px]"></i>
                                </a>` : ''}
                            </div>
                        </div>`;
                });

                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.contact-card').forEach(card => {
                        card.style.display = card.getAttribute('data-search').includes(term) ? 'flex' : 'none';
                    });
                });
            } catch (error) {
                console.error(error);
                document.getElementById('loader').innerHTML = '<p class="text-red-500">Erro na API.</p>';
            }
        }
        fetchContacts();
    </script>
</body>
</html>
