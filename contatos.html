<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handover Ops | Network Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; }
        
        .company-section { 
            background: #0f172a; 
            border: 1px solid #1e293b; 
            border-radius: 2.5rem;
            margin-bottom: 2rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .company-header {
            background: rgba(30, 41, 59, 0.3);
            border-bottom: 1px solid #1e293b;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo-frame { 
            background: white; 
            padding: 4px; 
            width: 64px;
            height: 64px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .person-row {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid rgba(30, 41, 59, 0.5);
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 1rem;
        }

        .person-row:last-child { border-bottom: none; }
        .person-row:hover { background: rgba(59, 130, 246, 0.03); }

        .btn-action {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.05);
            color: #94a3b8;
            transition: all 0.2s;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .glass-header { 
            background: rgba(2, 6, 23, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="sticky top-0 z-50 glass-header border-b border-slate-800 py-6 px-6">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4 text-left w-full md:w-auto">
                <a href="index.html" class="w-10 h-10 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center hover:bg-slate-800 transition-all active:scale-95">
                    <i class="fas fa-chevron-left text-slate-400"></i>
                </a>
                <div>
                    <h1 class="text-xl font-black text-white tracking-tighter uppercase italic">Network <span class="text-blue-500">Hub</span></h1>
                    <div class="flex flex-col">
                        <p class="text-green-500 text-[9px] font-bold tracking-widest uppercase italic flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                            Live Sync with Google API
                        </p>
                    </div>
                </div>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" placeholder="Buscar empresa ou pessoa..." 
                       class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-12 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-white transition-all">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-600"></i>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <div id="loader" class="text-center py-32">
            <div class="animate-spin inline-block w-8 h-8 border-[3px] border-blue-500 border-t-transparent rounded-full mb-4"></div>
            <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest italic">Sincronizando Diretório...</p>
        </div>

        <div id="directory"></div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxhPpNT5pxpe__PeJXW7MtsFOzX1Cag-ZZYG0_MIkXpWA-U699yvzn4YTT4sHaPBybS4Q/exec'; 
        const LOGO_TOKEN = 'pk_FGnHpYa7RVyBaPNWay1WYg';

        async function fetchContacts() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const directory = document.getElementById('directory');
                document.getElementById('loader').classList.add('hidden');
                directory.innerHTML = '';

                // AGRUPAMENTO LÓGICO POR EMPRESA
                const grouped = data.reduce((acc, item) => {
                    const getVal = (aliases) => {
                        const keys = Object.keys(item);
                        for (let a of aliases) {
                            const found = keys.find(k => k.toLowerCase().replace(/_/g, '').includes(a.toLowerCase()));
                            if (found && item[found]) return item[found];
                        }
                        return '';
                    };

                    const empresa = getVal(['empresa']) || 'Outros';
                    if (!acc[empresa]) acc[empresa] = { logoRaw: getVal(['logo', 'dominio']), pessoas: [] };
                    
                    acc[empresa].pessoas.push({
                        nome: getVal(['nome', 'pessoa']) || 'N/A',
                        funcao: getVal(['funcao', 'cargo']) || 'Colaborador',
                        setor: getVal(['setor']) || 'Geral',
                        email: getVal(['email']),
                        whatsapp: getVal(['whatsapp', 'whats']).toString().replace(/\D/g, ''),
                        telefone: getVal(['telefone'])
                    });
                    return acc;
                }, {});

                for (const [empresa, content] of Object.entries(grouped)) {
                    // Tratamento do Logo
                    let dominio = content.logoRaw.toString()
                        .toLowerCase()
                        .replace(/^(https?:\/\/)?(www\.)?/, '')
                        .split('/')[0]
                        .trim();

                    if(!dominio) dominio = `${empresa.toLowerCase().replace(/\s+/g, '')}.com`;
                    
                    const logoUrl = `https://img.logo.dev/${dominio}?token=${LOGO_TOKEN}`;
                    const fallbackUrl = `https://ui-avatars.com/api/?name=${empresa}&background=1e293b&color=3b82f6&bold=true`;

                    let sectionHTML = `
                        <section class="company-section shadow-2xl shadow-black/50" data-search="${empresa.toLowerCase()}">
                            <div class="company-header">
                                <div class="logo-frame">
                                    <img src="${logoUrl}" alt="${empresa}" class="max-w-full max-h-full object-contain" onerror="this.src='${fallbackUrl}'">
                                </div>
                                <div>
                                    <h2 class="text-xl font-black text-white italic uppercase tracking-tighter leading-none mb-1">${empresa}</h2>
                                    <p class="text-[9px] text-blue-500 font-bold tracking-[0.2em] uppercase opacity-80">${content.pessoas.length} Contato(s)</p>
                                </div>
                            </div>
                            <div class="company-body">
                    `;

                    content.pessoas.forEach(p => {
                        sectionHTML += `
                            <div class="person-row" data-search-person="${p.nome.toLowerCase()}">
                                <div>
                                    <p class="text-base font-bold text-slate-200 tracking-tight leading-none mb-1">${p.nome}</p>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[9px] text-blue-400 font-black uppercase italic tracking-widest">${p.setor}</span>
                                        <span class="text-slate-700 text-[10px]">•</span>
                                        <span class="text-[9px] text-slate-500 font-medium uppercase italic">${p.funcao}</span>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    ${p.email ? `<a href="mailto:${p.email}" title="Enviar E-mail" class="btn-action"><i class="fas fa-envelope text-xs"></i></a>` : ''}
                                    ${p.whatsapp ? `<a href="https://wa.me/${p.whatsapp}" target="_blank" title="WhatsApp" class="btn-action"><i class="fab fa-whatsapp text-sm"></i></a>` : ''}
                                    ${p.telefone && !p.whatsapp ? `<a href="tel:${p.telefone}" title="Ligar" class="btn-action"><i class="fas fa-phone text-xs"></i></a>` : ''}
                                </div>
                            </div>
                        `;
                    });

                    sectionHTML += `</div></section>`;
                    directory.innerHTML += sectionHTML;
                }

                // BUSCA EM TEMPO REAL
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.company-section').forEach(section => {
                        const companyName = section.getAttribute('data-search');
                        const persons = section.querySelectorAll('.person-row');
                        let hasVisiblePerson = false;

                        persons.forEach(row => {
                            const personName = row.getAttribute('data-search-person');
                            if (personName.includes(term) || companyName.includes(term)) {
                                row.style.display = 'grid';
                                hasVisiblePerson = true;
                            } else {
                                row.style.display = 'none';
                            }
                        });
                        section.style.display = hasVisiblePerson ? 'block' : 'none';
                    });
                });

            } catch (error) {
                console.error(error);
                document.getElementById('loader').innerHTML = '<p class="text-red-500 italic">Erro ao carregar diretório de contatos.</p>';
            }
        }
        fetchContacts();
    </script>
</body>
</html>
