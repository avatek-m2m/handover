<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handover Ops | Action Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1055/1055683.png" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; }
        .action-card { 
            background: #0f172a; border: 1px solid #1e293b; border-radius: 1.5rem;
            transition: all 0.3s ease;
        }
        .action-card:hover { border-color: #818cf8; transform: translateX(5px); }
        .glass-header { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .status-badge { font-[8px] font-black uppercase tracking-widest px-3 py-1 rounded-full border; }
    </style>
</head>
<body class="min-h-screen">

    <header class="sticky top-0 z-50 glass-header border-b border-slate-800 py-6 px-6">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4 text-left w-full md:w-auto">
                <a href="index.html" class="w-10 h-10 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center hover:bg-slate-800 transition-all">
                    <i class="fas fa-chevron-left text-slate-400"></i>
                </a>
                <div>
                    <h1 class="text-xl font-black text-white tracking-tighter uppercase italic">Action <span class="text-indigo-500">Log</span></h1>
                    <p class="text-indigo-400 text-[9px] font-bold tracking-widest uppercase italic flex items-center gap-1">
                        <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-pulse"></span> Ongoing Operations
                    </p>
                </div>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" placeholder="Buscar projeto ou cliente..." 
                       class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-12 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-white">
                <i class="fas fa-filter absolute left-4 top-3.5 text-slate-600"></i>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div id="loader" class="text-center py-20">
            <div class="animate-spin inline-block w-8 h-8 border-[3px] border-indigo-500 border-t-transparent rounded-full mb-4"></div>
        </div>

        <div id="actionList" class="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-800 before:to-transparent">
            </div>
    </main>

    <script>
        // ATENÇÃO: Substitua pela URL da nova API das Ações
        const API_URL = 'https://script.google.com/macros/s/AKfycbyte2iplSMCg9Kc4W0Qp5Qqw8kEP6mJI2jaZ6ojxC1Fy-Gbxp9aYmW9-C-H-nXi_nQJ/exec'; 

        async function fetchActions() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('actionList');
                document.getElementById('loader').classList.add('hidden');
                container.innerHTML = '';

                data.forEach((item, index) => {
                    const titulo     = item.titulo || item.Titulo || 'Sem Título';
                    const dataAcao   = item.data || item.Data || '';
                    const descricao  = item.descricao || item.Descricao || '';
                    const tipo       = (item.tipo || item.Tipo || 'Ação').toUpperCase();
                    const status     = (item.status || item.Status || 'Pendente').toUpperCase();
                    const prioridade = (item.prioridade || item.Prioridade || 'Normal').toUpperCase();

                    // Cores por Status
                    const statusClass = status.includes('CONCLU') ? 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20' : 
                                       status.includes('ANDAM') ? 'bg-amber-500/10 text-amber-500 border-amber-500/20' : 
                                       'bg-slate-500/10 text-slate-400 border-slate-500/20';

                    container.innerHTML += `
                        <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active py-4" data-search="${titulo.toLowerCase()} ${descricao.toLowerCase()}">
                            <div class="flex items-center justify-center w-10 h-10 rounded-full border border-slate-700 bg-slate-900 text-indigo-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10">
                                <i class="fas fa-circle text-[8px]"></i>
                            </div>
                            <div class="w-[calc(100%-4rem)] md:w-[45%] action-card p-6 shadow-xl">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-[9px] font-black text-indigo-400 tracking-[0.2em]">${dataAcao}</span>
                                    <span class="status-badge text-[8px] ${statusClass}">${status}</span>
                                </div>
                                <h3 class="text-lg font-bold text-white mb-2 uppercase tracking-tight">${titulo}</h3>
                                <p class="text-sm text-slate-400 leading-relaxed mb-4">${descricao}</p>
                                <div class="flex items-center gap-3 border-t border-slate-800 pt-4">
                                    <span class="text-[8px] bg-slate-800 px-2 py-1 rounded text-slate-500 font-bold uppercase">${tipo}</span>
                                    ${prioridade.includes('ALTA') ? '<span class="text-[8px] text-red-500 font-black uppercase italic tracking-widest">!!! Prioridade Máxima</span>' : ''}
                                </div>
                            </div>
                        </div>`;
                });

                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.relative.flex').forEach(item => {
                        const content = item.getAttribute('data-search');
                        item.style.display = content.includes(term) ? 'flex' : 'none';
                    });
                });
            } catch (error) {
                console.error(error);
            }
        }
        fetchActions();
    </script>
</body>
</html>
